services:
  # backend: 
  #   build: .
  #   ports:
  #     - 8000:8000
  #   depends_on:
  #     - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_DB=${DATABASE_NAME}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - warehouse_db:/var/lib/postgresql/data

volumes:
  warehouse_db:
